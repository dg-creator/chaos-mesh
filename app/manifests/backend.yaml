apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: python:3.9-slim
        command:
          - sh
          - -c
          - |
            pip install flask redis && \
            cat <<EOF > app.py
            import time, os
            from flask import Flask
            import redis
            app = Flask(__name__)
            r = redis.Redis(host='redis', port=6379, socket_connect_timeout=2)
            @app.route('/')
            def hello():
                try:
                    r.ping()
                    return "Backend OK: Podłączono do Redis!\n"
                except Exception as e:
                    return f"Backend ERROR: Brak połączenia z Redis: {e}\n", 500
            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=5000)
            EOF
            python app.py
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo-app
spec:
  ports:
  - port: 5000
  selector:
    app: backend