apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: python:3.9-slim
        command:
          - sh
          - -c
          - |
            pip install flask redis prometheus-flask-exporter && \
            cat <<'EOF' > app.py
            from flask import Flask, jsonify
            from prometheus_flask_exporter import PrometheusMetrics
            import redis

            app = Flask(__name__)
            metrics = PrometheusMetrics(app)
            r = redis.Redis(host='redis', port=6379, socket_connect_timeout=2, socket_timeout=2)

            @app.route('/')
            def hello():
                try:
                    r.ping()
                    return "Backend OK: Connected to Redis!\n"
                except Exception as e:
                    return f"Backend ERROR: Cannot connect to Redis: {e}\n", 500

            @app.route('/health')
            def health():
                try:
                    r.ping()
                    return jsonify(status="ok", redis="connected"), 200
                except Exception as e:
                    return jsonify(status="error", redis=str(e)), 500

            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=5000)
            EOF
            python app.py
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo-app
  labels:
    app: backend
spec:
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  selector:
    app: backend
